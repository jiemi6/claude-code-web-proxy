<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="claude-code-web-proxy logo">
  <defs>
    <linearGradient id="gradStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#f7768e"/>
    </linearGradient>
    <linearGradient id="gradBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#0f1018"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded square background -->
  <rect x="8" y="8" width="224" height="224" rx="44" ry="44" fill="url(#gradBg)" stroke="url(#gradStroke)" stroke-width="3"/>

  <!-- ambient glow -->
  <circle cx="120" cy="120" r="92" fill="url(#glow)"/>

  <!-- orbit ring -->
  <circle cx="120" cy="120" r="84" fill="none" stroke="url(#gradStroke)" stroke-width="1.2" stroke-dasharray="2 6" opacity="0.55"/>

  <!-- terminal prompt brackets + cursor: < / > -->
  <g filter="url(#softGlow)" fill="none" stroke="url(#gradStroke)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="82,80 46,120 82,160"/>
    <polyline points="158,80 194,120 158,160"/>
    <line x1="104" y1="168" x2="136" y2="72"/>
  </g>

  <!-- cursor block -->
  <rect x="110" y="176" width="20" height="6" rx="1.5" fill="#7aa2f7">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- corner tick marks -->
  <g stroke="url(#gradStroke)" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <path d="M24 40 L24 24 L40 24"/>
    <path d="M200 24 L216 24 L216 40"/>
    <path d="M216 200 L216 216 L200 216"/>
    <path d="M40 216 L24 216 L24 200"/>
  </g>
</svg>
