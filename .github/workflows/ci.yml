name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Syntax check & smoke test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check all JS files
        run: |
          find backend -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Smoke test (start server, hit /api/sessions, shutdown)
        env:
          HOST: 127.0.0.1
          PORT: 18199
        run: |
          node backend/server.js &
          SERVER_PID=$!
          sleep 2
          curl -fsS "http://127.0.0.1:18199/api/sessions" || (kill $SERVER_PID; exit 1)
          kill $SERVER_PID
